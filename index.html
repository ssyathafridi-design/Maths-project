<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gauss-Jordan Elimination Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #07080c;
            --bg-elevated: #0d0f14;
            --bg-card: rgba(15, 17, 23, 0.9);
            --fg: #e4e4e9;
            --fg-secondary: #9898a6;
            --muted: #5c5c6d;
            --accent: #22d3a8;
            --accent-secondary: #0ea5e9;
            --accent-dim: rgba(34, 211, 168, 0.12);
            --border: rgba(255, 255, 255, 0.06);
            --border-active: rgba(255, 255, 255, 0.12);
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .mono {
            font-family: 'IBM Plex Mono', monospace;
        }

        /* Animated background */
        .bg-mesh {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(34, 211, 168, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 100% 100%, rgba(14, 165, 233, 0.1), transparent);
            pointer-events: none;
            z-index: 0;
        }

        .bg-noise {
            position: fixed;
            inset: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* Glass morphism */
        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
        }

        /* Cards */
        .card {
            background: linear-gradient(145deg, rgba(20, 22, 30, 0.95), rgba(12, 14, 20, 0.98));
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow:
                0 4px 24px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .card-elevated {
            background: linear-gradient(145deg, rgba(25, 28, 38, 0.98), rgba(18, 20, 28, 0.99));
            border: 1px solid var(--border-active);
            box-shadow:
                0 8px 40px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.02) inset;
        }

        /* Matrix input */
        .matrix-input {
            width: 64px;
            height: 52px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--fg);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 15px;
            text-align: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .matrix-input:hover {
            border-color: var(--border-active);
            background: rgba(0, 0, 0, 0.4);
        }

        .matrix-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim), 0 0 20px var(--accent-dim);
            background: rgba(0, 0, 0, 0.6);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 500;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #16a085 100%);
            color: #000;
            font-weight: 600;
            padding: 14px 28px;
            font-size: 15px;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(34, 211, 168, 0.35);
        }

        .btn-primary:hover::before {
            opacity: 1;
        }

        .btn-primary:active {
            transform: translateY(0);
            box-shadow: 0 4px 15px rgba(34, 211, 168, 0.25);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            color: var(--fg-secondary);
            padding: 12px 20px;
            border: 1px solid var(--border);
            font-size: 14px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--border-active);
            color: var(--fg);
        }

        .btn-ghost {
            background: transparent;
            color: var(--fg-secondary);
            padding: 10px 16px;
            font-size: 14px;
        }

        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--fg);
        }

        /* Size selector */
        .size-chip {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .size-chip:hover:not(.active) {
            border-color: var(--border-active);
            color: var(--fg-secondary);
            background: rgba(255, 255, 255, 0.03);
        }

        .size-chip.active {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 20px var(--accent-dim);
        }

        /* History panel */
        .history-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 400px;
            max-width: 90vw;
            height: 100vh;
            background: var(--bg-elevated);
            border-left: 1px solid var(--border);
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .history-panel.open {
            transform: translateX(0);
        }

        .history-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 99;
        }

        .history-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .history-item {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        /* Matrix display */
        .matrix-bracket {
            font-size: 3.5rem;
            font-weight: 200;
            color: var(--muted);
            line-height: 1;
            user-select: none;
        }

        .matrix-cell {
            min-width: 48px;
            padding: 6px 8px;
            text-align: center;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
        }

        .augmented-divider {
            width: 1.5px;
            height: 100%;
            background: linear-gradient(180deg, transparent, var(--accent), transparent);
            margin: 0 6px;
            opacity: 0.6;
        }

        /* Steps */
        .step-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            opacity: 0;
            transform: translateY(12px);
            animation: stepReveal 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes stepReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-success {
            background: rgba(34, 211, 168, 0.12);
            color: var(--accent);
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.12);
            color: var(--warning);
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.12);
            color: var(--danger);
        }

        /* Animations */
        .fade-up {
            opacity: 0;
            transform: translateY(24px);
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .delay-1 {
            animation-delay: 0.1s;
        }

        .delay-2 {
            animation-delay: 0.2s;
        }

        .delay-3 {
            animation-delay: 0.3s;
        }

        .delay-4 {
            animation-delay: 0.4s;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Focus */
        *:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .matrix-input {
                width: 52px;
                height: 44px;
                font-size: 13px;
            }

            .matrix-bracket {
                font-size: 2.5rem;
            }

            .matrix-cell {
                min-width: 40px;
                font-size: 12px;
            }
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
            text-align: center;
        }
    </style>
</head>

<body>
    <!-- Background -->
    <div class="bg-mesh"></div>
    <div class="bg-noise"></div>
    <div class="bg-grid"></div>

    <!-- History Overlay -->
    <div class="history-overlay" id="historyOverlay"></div>

    <!-- History Panel -->
    <aside class="history-panel" id="historyPanel" role="dialog" aria-label="Calculation history">
        <div class="flex items-center justify-between p-5 border-b border-[var(--border)]">
            <h2 class="text-lg font-semibold">History</h2>
            <div class="flex items-center gap-2">
                <button class="btn btn-ghost text-xs" id="clearHistoryBtn">Clear All</button>
                <button class="btn btn-ghost p-2" id="closeHistoryBtn" aria-label="Close history">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto" id="historyList"></div>
    </aside>

    <!-- Main Content -->
    <main class="relative z-10 min-h-screen">
        <div class="max-w-4xl mx-auto px-4 py-8 md:py-12">

            <!-- Header -->
            <header class="mb-10 fade-up">
                <div class="flex items-start justify-between">
                    <div>
                        <h1 class="text-3xl md:text-4xl font-bold tracking-tight mb-2">
                            Gauss-Jordan
                            <span class="text-[var(--accent)]">Elimination</span>
                        </h1>
                        <p class="text-[var(--fg-secondary)]">
                            Solve systems of linear equations with detailed steps
                        </p>
                    </div>
                    <button class="btn btn-secondary" id="openHistoryBtn">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        History
                        <span class="bg-[var(--accent-dim)] text-[var(--accent)] text-xs px-2 py-0.5 rounded-full"
                            id="historyCount">0</span>
                    </button>
                </div>
            </header>

            <!-- Matrix Size Selector -->
            <section class="card p-5 mb-5 fade-up delay-1">
                <div class="flex items-center gap-4">
                    <span class="text-sm text-[var(--fg-secondary)]">Matrix Size</span>
                    <div class="flex gap-2" role="radiogroup" aria-label="Matrix size">
                        <button class="size-chip active" data-size="2" role="radio" aria-checked="true">2x2</button>
                        <button class="size-chip" data-size="3" role="radio" aria-checked="false">3x3</button>
                        <button class="size-chip" data-size="4" role="radio" aria-checked="false">4x4</button>
                        <button class="size-chip" data-size="5" role="radio" aria-checked="false">5x5</button>
                    </div>
                </div>
            </section>

            <!-- Matrix Input -->
            <section class="card card-elevated p-6 md:p-8 mb-5 fade-up delay-2">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-8 h-8 rounded-lg bg-[var(--accent-dim)] flex items-center justify-center">
                        <svg class="w-4 h-4 text-[var(--accent)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                        </svg>
                    </div>
                    <div>
                        <h2 class="font-semibold">Augmented Matrix</h2>
                        <!-- Changed [A|b] to [A|B] as requested -->
                        <p class="text-xs text-[var(--muted)]">Enter coefficients [A|B]</p>
                    </div>
                </div>

                <div class="flex items-center justify-center overflow-x-auto py-4 px-2">
                    <span class="matrix-bracket">[</span>
                    <div id="matrixInput" class="flex flex-col gap-2"></div>
                    <span class="matrix-bracket">]</span>
                </div>

                <div class="flex flex-wrap gap-3 justify-center mt-8">
                    <button class="btn btn-primary" id="solveBtn">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                        Solve System
                    </button>
                    <button class="btn btn-secondary" id="randomBtn">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                        Random
                    </button>
                    <button class="btn btn-secondary" id="clearBtn">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                        Clear
                    </button>
                </div>
            </section>

            <!-- Results -->
            <div id="resultsSection" class="hidden">
                <!-- Solution Summary -->
                <section class="card p-6 md:p-8 mb-5" id="solutionSection">
                    <div class="flex items-center gap-3 mb-5">
                        <div class="w-8 h-8 rounded-lg bg-[var(--accent-dim)] flex items-center justify-center">
                            <svg class="w-4 h-4 text-[var(--accent)]" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                        <div>
                            <h2 class="font-semibold">Solution</h2>
                            <p class="text-xs text-[var(--muted)]" id="solutionType">Unique solution</p>
                        </div>
                    </div>
                    <div id="solutionDisplay"></div>
                </section>

                <!-- Steps -->
                <section class="card p-6 md:p-8">
                    <div class="flex items-center gap-3 mb-5">
                        <div class="w-8 h-8 rounded-lg bg-[rgba(14,165,233,0.12)] flex items-center justify-center">
                            <svg class="w-4 h-4 text-[var(--accent-secondary)]" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                            </svg>
                        </div>
                        <div>
                            <h2 class="font-semibold">Solution Steps</h2>
                            <p class="text-xs text-[var(--muted)]">Row operations to reduced row echelon form</p>
                        </div>
                    </div>
                    <div id="stepsDisplay" class="space-y-3 max-h-[60vh] overflow-y-auto pr-2"></div>
                </section>
            </div>

        </div>
    </main>

    <script>
        // Application State
        const state = {
            matrixSize: 2,
            currentMatrix: [],
            history: [],
            isHistoryOpen: false
        };

        // DOM Elements - initialized after DOM is ready
        let elements = {};

        // Initialize application
        function init() {
            cacheElements();
            loadHistory();
            renderMatrixInput();
            setupEventListeners();
            updateHistoryCount();
        }

        // Cache DOM elements
        function cacheElements() {
            elements = {
                matrixInput: document.getElementById('matrixInput'),
                solveBtn: document.getElementById('solveBtn'),
                clearBtn: document.getElementById('clearBtn'),
                randomBtn: document.getElementById('randomBtn'),
                resultsSection: document.getElementById('resultsSection'),
                solutionDisplay: document.getElementById('solutionDisplay'),
                solutionType: document.getElementById('solutionType'),
                stepsDisplay: document.getElementById('stepsDisplay'),
                sizeChips: document.querySelectorAll('.size-chip'),
                historyPanel: document.getElementById('historyPanel'),
                historyOverlay: document.getElementById('historyOverlay'),
                historyList: document.getElementById('historyList'),
                historyCount: document.getElementById('historyCount'),
                openHistoryBtn: document.getElementById('openHistoryBtn'),
                closeHistoryBtn: document.getElementById('closeHistoryBtn'),
                clearHistoryBtn: document.getElementById('clearHistoryBtn')
            };
        }

        // Render matrix input grid
        function renderMatrixInput() {
            const { matrixInput } = elements;
            matrixInput.innerHTML = '';

            for (let i = 0; i < state.matrixSize; i++) {
                const row = document.createElement('div');
                row.className = 'flex items-center gap-2';

                for (let j = 0; j < state.matrixSize + 1; j++) {
                    if (j === state.matrixSize) {
                        const divider = document.createElement('div');
                        divider.className = 'augmented-divider h-12';
                        row.appendChild(divider);
                    }

                    const input = document.createElement('input');
                    input.type = 'number';
                    input.step = 'any';
                    input.className = 'matrix-input';
                    input.placeholder = '0';
                    input.dataset.row = i;
                    input.dataset.col = j;
                    input.setAttribute('aria-label', `Row ${i + 1}, Column ${j + 1}`);
                    row.appendChild(input);
                }

                matrixInput.appendChild(row);
            }
        }

        // Setup event listeners
        function setupEventListeners() {
            // Size selection
            elements.sizeChips.forEach(chip => {
                chip.addEventListener('click', () => {
                    elements.sizeChips.forEach(c => {
                        c.classList.remove('active');
                        c.setAttribute('aria-checked', 'false');
                    });
                    chip.classList.add('active');
                    chip.setAttribute('aria-checked', 'true');
                    state.matrixSize = parseInt(chip.dataset.size);
                    renderMatrixInput();
                    elements.resultsSection.classList.add('hidden');
                });
            });

            // Buttons
            elements.solveBtn.addEventListener('click', solveSystem);
            elements.clearBtn.addEventListener('click', clearMatrix);
            elements.randomBtn.addEventListener('click', fillRandom);

            // History panel
            elements.openHistoryBtn.addEventListener('click', openHistory);
            elements.closeHistoryBtn.addEventListener('click', closeHistory);
            elements.historyOverlay.addEventListener('click', closeHistory);
            elements.clearHistoryBtn.addEventListener('click', clearHistory);

            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && state.isHistoryOpen) {
                    closeHistory();
                }
            });
        }

        // Get matrix values
        function getMatrixValues() {
            const inputs = elements.matrixInput.querySelectorAll('.matrix-input');
            const matrix = [];

            for (let i = 0; i < state.matrixSize; i++) {
                matrix[i] = [];
                for (let j = 0; j < state.matrixSize + 1; j++) {
                    const input = elements.matrixInput.querySelector(`[data-row="${i}"][data-col="${j}"]`);
                    const val = parseFloat(input.value) || 0;
                    matrix[i][j] = val;
                }
            }

            return matrix;
        }

        // Format number
        function formatNumber(num) {
            if (Math.abs(num) < 1e-10) return '0';
            if (Math.abs(num - Math.round(num)) < 1e-10) return Math.round(num).toString();
            const formatted = num.toFixed(6);
            return parseFloat(formatted).toString();
        }

        // Create matrix HTML display
        function createMatrixDisplay(mat, compact = false) {
            const rows = mat.length;
            const cols = mat[0].length;
            const augCol = cols - 1;

            let html = '<div class="flex items-center justify-center">';
            html += `<span class="matrix-bracket ${compact ? 'text-2xl' : ''}">[</span>`;
            html += '<div class="flex flex-col">';

            for (let i = 0; i < rows; i++) {
                html += '<div class="flex items-center">';
                for (let j = 0; j < cols; j++) {
                    if (j === augCol && cols > 1) {
                        html += '<div class="augmented-divider h-8"></div>';
                    }
                    const val = mat[i][j];
                    const isAug = j === augCol;
                    const isZero = Math.abs(val) < 1e-10;
                    let colorClass = 'text-[var(--fg)]';
                    if (isZero) colorClass = 'text-[var(--muted)]';
                    else if (isAug) colorClass = 'text-[var(--accent)]';

                    html += `<span class="matrix-cell ${colorClass} ${compact ? 'text-xs' : ''}">${formatNumber(val)}</span>`;
                }
                html += '</div>';
            }

            html += '</div>';
            html += `<span class="matrix-bracket ${compact ? 'text-2xl' : ''}">]</span>`;
            html += '</div>';

            return html;
        }

        // Gauss-Jordan elimination
        function gaussJordanElimination(matrix) {
            const n = matrix.length;
            const m = matrix[0].length;
            const steps = [];

            let current = matrix.map(row => [...row]);
            steps.push({
                description: 'Initial augmented matrix',
                matrix: current.map(row => [...row])
            });

            let pivotRow = 0;

            for (let col = 0; col < n && pivotRow < n; col++) {
                // Find pivot
                let maxRow = pivotRow;
                for (let row = pivotRow + 1; row < n; row++) {
                    if (Math.abs(current[row][col]) > Math.abs(current[maxRow][col])) {
                        maxRow = row;
                    }
                }

                // Swap rows
                if (maxRow !== pivotRow) {
                    [current[pivotRow], current[maxRow]] = [current[maxRow], current[pivotRow]];
                    steps.push({
                        description: `Swap R${pivotRow + 1} with R${maxRow + 1}`,
                        matrix: current.map(row => [...row])
                    });
                }

                // Check zero pivot
                if (Math.abs(current[pivotRow][col]) < 1e-10) continue;

                // Scale pivot row
                const pivot = current[pivotRow][col];
                if (Math.abs(pivot - 1) > 1e-10) {
                    for (let j = 0; j < m; j++) {
                        current[pivotRow][j] /= pivot;
                    }
                    steps.push({
                        description: `R${pivotRow + 1} = R${pivotRow + 1} / (${formatNumber(pivot)})`,
                        matrix: current.map(row => [...row])
                    });
                }

                // Eliminate column
                for (let row = 0; row < n; row++) {
                    if (row !== pivotRow && Math.abs(current[row][col]) > 1e-10) {
                        const factor = current[row][col];
                        for (let j = 0; j < m; j++) {
                            current[row][j] -= factor * current[pivotRow][j];
                        }
                        steps.push({
                            description: `R${row + 1} = R${row + 1} - (${formatNumber(factor)}) * R${pivotRow + 1}`,
                            matrix: current.map(row => [...row])
                        });
                    }
                }

                pivotRow++;
            }

            return { result: current, steps };
        }

        // Extract solution
        function extractSolution(mat) {
            const n = mat.length;
            const m = mat[0].length;
            const solution = [];
            const pivotCols = [];

            // Check for inconsistency
            for (let i = 0; i < n; i++) {
                let allZero = true;
                for (let j = 0; j < n; j++) {
                    if (Math.abs(mat[i][j]) > 1e-10) {
                        allZero = false;
                        break;
                    }
                }
                if (allZero && Math.abs(mat[i][m - 1]) > 1e-10) {
                    return { type: 'inconsistent', solution: null };
                }
            }

            // Find pivot columns
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    if (Math.abs(mat[i][j] - 1) < 1e-10) {
                        let isPivot = true;
                        for (let k = 0; k < n; k++) {
                            if (k !== i && Math.abs(mat[k][j]) > 1e-10) {
                                isPivot = false;
                                break;
                            }
                        }
                        if (isPivot) {
                            solution[j] = mat[i][m - 1];
                            pivotCols.push(j);
                            break;
                        }
                    }
                }
            }

            // Check for free variables
            for (let i = 0; i < n; i++) {
                if (solution[i] === undefined) {
                    return { type: 'infinite', solution };
                }
            }

            return { type: 'unique', solution };
        }

        // Main solve function
        function solveSystem() {
            const matrix = getMatrixValues();
            state.currentMatrix = matrix;

            const { result, steps } = gaussJordanElimination(matrix);
            const sol = extractSolution(result);

            elements.resultsSection.classList.remove('hidden');
            setTimeout(() => {
                elements.resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);

            // Display solution
            renderSolution(sol, result);
            renderSteps(steps);

            // Save to history
            saveToHistory(matrix, sol, steps);
        }

        // Render solution
        function renderSolution(sol, result) {
            if (sol.type === 'inconsistent') {
                elements.solutionType.textContent = 'No solution exists';
                elements.solutionDisplay.innerHTML = `
          <div class="badge badge-danger">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
            Inconsistent System
          </div>
          <p class="text-[var(--fg-secondary)] mt-3 text-sm">The system has no solution because there is a contradiction in the equations.</p>
        `;
            } else if (sol.type === 'infinite') {
                elements.solutionType.textContent = 'Infinitely many solutions';
                elements.solutionDisplay.innerHTML = `
          <div class="badge badge-warning">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            Underdetermined System
          </div>
          <p class="text-[var(--fg-secondary)] mt-3 text-sm">The system has infinitely many solutions due to free variables.</p>
        `;
            } else {
                elements.solutionType.textContent = 'Unique solution found';
                let html = '<div class="flex flex-wrap gap-3">';
                sol.solution.forEach((val, i) => {
                    html += `
            <div class="bg-[var(--bg)] border border-[var(--border)] rounded-xl px-5 py-3 flex items-center gap-2">
              <span class="text-[var(--muted)] text-sm mono">x<sub>${i + 1}</sub></span>
              <span class="text-[var(--accent)] font-semibold mono text-lg">${formatNumber(val)}</span>
            </div>
          `;
                });
                html += '</div>';
                elements.solutionDisplay.innerHTML = html;
            }
        }

        // Render steps
        function renderSteps(steps) {
            elements.stepsDisplay.innerHTML = '';
            steps.forEach((step, index) => {
                const stepCard = document.createElement('div');
                stepCard.className = 'step-card';
                stepCard.style.animationDelay = `${index * 0.04}s`;
                stepCard.innerHTML = `
          <div class="flex items-center gap-2 mb-3">
            <span class="bg-[var(--bg)] text-[var(--fg-secondary)] text-xs mono px-2 py-1 rounded-md">${String(index + 1).padStart(2, '0')}</span>
            <span class="text-sm text-[var(--fg)]">${step.description}</span>
          </div>
          ${createMatrixDisplay(step.matrix)}
        `;
                elements.stepsDisplay.appendChild(stepCard);
            });
        }

        // History functions
        function loadHistory() {
            try {
                const saved = localStorage.getItem('gaussJordanHistory');
                state.history = saved ? JSON.parse(saved) : [];
            } catch (e) {
                state.history = [];
            }
        }

        function saveToHistory(matrix, solution, steps) {
            const entry = {
                id: Date.now(),
                timestamp: new Date().toISOString(),
                size: state.matrixSize,
                matrix: matrix,
                solution: solution,
                steps: steps
            };

            state.history.unshift(entry);
            if (state.history.length > 20) state.history.pop();

            try {
                localStorage.setItem('gaussJordanHistory', JSON.stringify(state.history));
            } catch (e) {
                console.warn('Could not save history to localStorage');
            }

            updateHistoryCount();
            renderHistoryList();
        }

        function updateHistoryCount() {
            elements.historyCount.textContent = state.history.length;
        }

        function renderHistoryList() {
            if (state.history.length === 0) {
                elements.historyList.innerHTML = `
          <div class="empty-state">
            <svg class="w-12 h-12 text-[var(--muted)] mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <p class="text-[var(--muted)] text-sm">No calculations yet</p>
            <p class="text-[var(--muted)] text-xs mt-1">Solve a system to see it here</p>
          </div>
        `;
                return;
            }

            elements.historyList.innerHTML = state.history.map(entry => {
                const date = new Date(entry.timestamp);
                const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const dateStr = date.toLocaleDateString([], { month: 'short', day: 'numeric' });

                let solutionPreview = '';
                if (entry.solution.type === 'unique' && entry.solution.solution) {
                    const preview = entry.solution.solution.slice(0, 3).map((v, i) => `x${i + 1}=${formatNumber(v)}`).join(', ');
                    solutionPreview = preview + (entry.solution.solution.length > 3 ? '...' : '');
                } else if (entry.solution.type === 'inconsistent') {
                    solutionPreview = 'No solution';
                } else {
                    solutionPreview = 'Infinite solutions';
                }

                return `
          <div class="history-item" data-id="${entry.id}">
            <div class="flex items-start justify-between mb-2">
              <span class="text-xs text-[var(--muted)]">${dateStr} at ${timeStr}</span>
              <span class="text-xs mono text-[var(--fg-secondary)]">${entry.size}x${entry.size}</span>
            </div>
            <div class="mb-2">
              ${createMatrixDisplay(entry.matrix, true)}
            </div>
            <div class="text-sm text-[var(--accent)] mono">${solutionPreview}</div>
          </div>
        `;
            }).join('');

            // Add click handlers
            elements.historyList.querySelectorAll('.history-item').forEach(item => {
                item.addEventListener('click', () => loadFromHistory(parseInt(item.dataset.id)));
            });
        }

        function loadFromHistory(id) {
            const entry = state.history.find(e => e.id === id);
            if (!entry) return;

            // Update size
            state.matrixSize = entry.size;
            elements.sizeChips.forEach(chip => {
                chip.classList.remove('active');
                chip.setAttribute('aria-checked', 'false');
                if (parseInt(chip.dataset.size) === entry.size) {
                    chip.classList.add('active');
                    chip.setAttribute('aria-checked', 'true');
                }
            });

            // Render and fill matrix
            renderMatrixInput();
            setTimeout(() => {
                entry.matrix.forEach((row, i) => {
                    row.forEach((val, j) => {
                        const input = elements.matrixInput.querySelector(`[data-row="${i}"][data-col="${j}"]`);
                        if (input) input.value = val;
                    });
                });

                // Show solution
                renderSolution(entry.solution, entry.steps[entry.steps.length - 1].matrix);
                renderSteps(entry.steps);
                elements.resultsSection.classList.remove('hidden');

                closeHistory();
            }, 50);
        }

        function openHistory() {
            state.isHistoryOpen = true;
            renderHistoryList();
            elements.historyPanel.classList.add('open');
            elements.historyOverlay.classList.add('open');
        }

        function closeHistory() {
            state.isHistoryOpen = false;
            elements.historyPanel.classList.remove('open');
            elements.historyOverlay.classList.remove('open');
        }

        function clearHistory() {
            if (!confirm('Clear all calculation history?')) return;
            state.history = [];
            try {
                localStorage.removeItem('gaussJordanHistory');
            } catch (e) { }
            updateHistoryCount();
            renderHistoryList();
        }

        // Utility functions
        function clearMatrix() {
            elements.matrixInput.querySelectorAll('.matrix-input').forEach(input => input.value = '');
            elements.resultsSection.classList.add('hidden');
        }

        function fillRandom() {
            const inputs = elements.matrixInput.querySelectorAll('.matrix-input');
            inputs.forEach(input => {
                input.value = Math.floor(Math.random() * 19) - 9;
            });
        }

        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
